name: Desktop Build (Linux arm64)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 要构建的分支 / tag / commit（默认 main）
        required: false
        default: main
      version_label:
        description: semver 版本号（不要写 v 前缀），例如 0.0.0-dev 或 1.1.1
        required: false
        default: "0.0.0-dev"

permissions:
  contents: read

env:
  NODE_VERSION: 22.19.0

jobs:
  linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare version config
        working-directory: crates/agent-gui
        env:
          RAW_VERSION: ${{ github.event.inputs.version_label || '0.0.0-dev' }}
        run: |
          set -euo pipefail
          # 必须是 v + semver（脚本不接受 vdev 这类）
          ver="${RAW_VERSION#v}"
          tag="v${ver}"
          echo "Using version tag for script: ${tag}"
          node ../../scripts/release/prepare-app-version-from-tag.mjs "$tag" \
            --github-env "$GITHUB_ENV" \
            --tauri-config src-tauri/tauri.version.generated.conf.json
          echo "LIVEAGENT_ARTIFACT_LABEL=${tag}" >> "$GITHUB_ENV"

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            protobuf-compiler \
            rpm \
            wget \
            xdg-utils

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri
          key: linux-aarch64-build-only

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Build Linux arm64 deb/rpm
        working-directory: crates/agent-gui
        env:
          # 只要安装包：不注入签名密钥，避免 updater 私钥/密码导致失败
          LIVEAGENT_UPDATE_REPOSITORY: ${{ github.repository }}
        run: >
          pnpm tauri build
          --config src-tauri/tauri.linux.release.conf.json
          --config "$LIVEAGENT_TAURI_VERSION_CONFIG"
          --target aarch64-unknown-linux-gnu
          --bundles deb rpm

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          label="${LIVEAGENT_ARTIFACT_LABEL:-v0.0.0-dev}"

          deb_path="$(find crates/agent-gui/src-tauri/target target -type f -name '*.deb' -path '*bundle*' -print -quit 2>/dev/null || true)"
          rpm_path="$(find crates/agent-gui/src-tauri/target target -type f -name '*.rpm' -path '*bundle*' -print -quit 2>/dev/null || true)"

          echo "deb_path=${deb_path:-<empty>}"
          echo "rpm_path=${rpm_path:-<empty>}"

          test -n "$deb_path"
          test -n "$rpm_path"

          cp "$deb_path" "dist/LiveAgent-${label}-Linux-aarch64.deb"
          cp "$rpm_path" "dist/LiveAgent-${label}-Linux-aarch64.rpm"
          ls -lah dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: liveagent-linux-aarch64
          path: dist/*
          if-no-files-found: error
          retention-days: 14
